name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate workspace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: thumbv7em-none-eabihf

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Metadata
        run: cargo metadata --no-deps --format-version 1

      - name: Format
        run: cargo fmt --check --all

      - name: Clippy
        run: cargo clippy --workspace --target thumbv7em-none-eabihf --all-targets -- -D warnings

      - name: Check
        run: cargo check --workspace --target thumbv7em-none-eabihf

      - name: Check all features
        run: cargo check --workspace --target thumbv7em-none-eabihf --all-features

      - name: Release build
        run: |
          cargo build --workspace --exclude dual-core-m4 --target thumbv7em-none-eabihf --release
          cargo build -p dual-core-m4 --target thumbv7em-none-eabihf --release

      - name: Docs
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc -p giga-r1 --target thumbv7em-none-eabihf --all-features --no-deps

      - name: Publish dry-run
        run: cargo publish -p giga-r1 --dry-run --allow-dirty --target thumbv7em-none-eabihf
